name: Run Tests

on: workflow_dispatch

jobs:
  test-node:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: services/node/api-node/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download deps
        run: npm ci

      - name: Run tests
        run: npm test

  test-golang:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: services/go/api-golang/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.3"

      - name: Download deps
        run: go mod tidy

      - name: Run test
        run: go test ./...
