name: React Client ci

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: services/react/client-react/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: services/react/client-react/package-lock.json

      - name: Download dependencies
        run: npm ci

      - name: Run tests
        run: npm test
